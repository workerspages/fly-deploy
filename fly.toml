app = "vaultwarden-webdav"
primary_region = "sin"

[build]
  image = "ghcr.io/workerspages/vaultwarden-webdav:latest"

[env]
  TZ = "Asia/Shanghai"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "vw_data"
  destination = "/data"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
  swap_size_mb = 512  # 增加 Swap 防止崩溃
